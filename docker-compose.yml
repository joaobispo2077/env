services:
  ai-memory:
    image: akitaonrails/ai-memory:latest
    container_name: ai-memory
    user: "0:0"
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:49374:49374"
    volumes:
      - "${AI_MEMORY_HOST_DATA_DIR:-C:/ai-memory-data}:/data"
    environment:
      - AI_MEMORY_DATA_DIR=/data
      - AI_MEMORY_ALLOWED_HOSTS=localhost,127.0.0.1,::1,host.docker.internal
      - AI_MEMORY_LLM_PROVIDER
      - AI_MEMORY_LLM_MODEL
      - AI_MEMORY_EMBEDDING_PROVIDER
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GEMINI_API_KEY
